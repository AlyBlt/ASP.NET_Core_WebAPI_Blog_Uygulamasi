name: Deploy to Ubuntu Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API Image
        run: |
          # BLOG klasörünün içine girip orayý 'context' olarak kullanýyoruz
          cd BLOG
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/blog-api:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/blog-api:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Ţifreleri GitHub Secrets'tan alýp SSH ortamýna aktarýr
          envs: DB_PASSWORD,DB_USER,DB_NAME,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,ShowSwagger
          script: |
            cd ~/blog-app
            docker-compose pull
            # Ţifreleri docker-compose çalýţýrken içeri enjekte ediyoruz
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_USER="${{ secrets.DB_USER }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            JWT_ISSUER="${{ secrets.JWT_ISSUER }}" \
            JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" \
            ShowSwagger="${{ secrets.ShowSwagger }}" \
            docker-compose up -d
            docker image prune -f