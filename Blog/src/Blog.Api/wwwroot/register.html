<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">Register</h3>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input id="username" type="text" class="form-control" placeholder="Enter your username">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" placeholder="Enter your password">
                        </div>

                        <button onclick="register()" class="btn btn-success w-100 mb-3">
                            Register
                        </button>

                        <p id="result" class="text-center text-danger"></p>

                        <div class="text-center">
                            <a href="index.html">Back to home</a>
                            <br>
                            <a href="login.html">Already have an account? Login</a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/auth.js"></script>

    <script>
        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                register();
            }
        });
    </script>

</body>
</html>
