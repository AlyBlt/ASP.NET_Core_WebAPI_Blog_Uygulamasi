<!DOCTYPE html>
<html>
<head>
    <title>Article Details</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Blog App</a>
            <div class="ms-auto">
                <button class="btn btn-outline-light me-2" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 id="articleTitle" class="mb-3"></h2>
                        <p class="text-muted mb-3" id="articleAuthor"></p>
                        <p id="articleContent"></p>
                        <a href="articles.html" class="btn btn-primary mt-3">Back to Articles</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
const API = "https://localhost:7281/api/articles";
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
}

// URL’den id’yi al
const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get("id");

async function loadArticle() {
    if (!articleId) {
        alert("Article ID missing");
        window.location.href = "articles.html";
        return;
    }

    const response = await fetch(`${API}/${articleId}`, {
        headers: { "Authorization": "Bearer " + token }
    });

    if (!response.ok) {
        alert("Failed to load article: " + response.status);
        return;
    }

    const article = await response.json();
    document.getElementById("articleTitle").innerText = article.title;
    document.getElementById("articleAuthor").innerText = `Author: ${article.authorName}`;
    document.getElementById("articleContent").innerText = article.content;
}

// Logout
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    alert("Logged out");
    window.location.href = "login.html";
}

loadArticle();
    </script>

</body>
</html>
