<!DOCTYPE html>
<html>
<head>
    <title>Update Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="articles.html">Blog App</a>
            <div class="ms-auto">
                <button class="btn btn-outline-light me-2" onclick="window.location.href='articles.html'">Back to List</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title mb-4">Update Article</h3>
                        <div id="updateForm">
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input id="editTitle" type="text" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Content</label>
                                <textarea id="editContent" class="form-control" rows="8"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select id="editCategory" class="form-control"></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tags</label>
                                <select id="editTags" class="form-control" multiple></select>
                                <small class="text-muted">Hold Ctrl (Cmd) to select multiple tags.</small>
                            </div>
                            <button class="btn btn-warning w-100" onclick="saveUpdate()">Save Changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/updateArticle.js"></script>
</body>
</html>
